<!-- @dsCard group="ハザードマップ" name="レイヤー切替" subtitle="洪水/土砂/津波トグル＋不透明度" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SafeTabi — Layer Toggle</title>
<style>
  :root{--ink:#1c2530;--muted:#5b6b7b;--line:#e3e8ee;--flood:#2b6cb0;--landslide:#9c5a2d;--tsunami:#6b46c1}
  *{box-sizing:border-box} body{margin:0;background:#aeb7bf;font-family:"Hiragino Sans",system-ui,sans-serif;padding:24px}
  .panel{width:320px;margin:0 auto;background:#fff;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.18);padding:16px 16px 20px}
  .panel h3{margin:0 0 4px;font-size:15px;color:var(--ink)}
  .panel .sub{margin:0 0 14px;font-size:11.5px;color:var(--muted)}
  .row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
  .swatch{width:18px;height:18px;border-radius:5px;flex:0 0 auto}
  .row .name{font-size:13.5px;color:var(--ink)} .row .name small{display:block;color:var(--muted);font-size:11px}
  /* toggle */
  .tg{margin-left:auto;width:44px;height:26px;border-radius:13px;position:relative;cursor:pointer;transition:.2s}
  .tg .knob{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:.2s}
  .tg.on{background:#2563eb} .tg.on .knob{left:21px}
  .tg.off{background:#cdd5dd} .tg.off .knob{left:3px}
  .opacity{margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
  .opacity label{font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
  .track{margin-top:8px;height:6px;border-radius:3px;background:linear-gradient(90deg,#cdd5dd,#2563eb);position:relative}
  .track .h{position:absolute;left:62%;top:-6px;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #2563eb;box-shadow:0 1px 4px rgba(0,0,0,.25)}
</style>
</head>
<body>
  <div class="panel">
    <h3>Map layers</h3>
    <p class="sub">Toggle hazard overlays / 地図レイヤー</p>

    <div class="row">
      <span class="swatch" style="background:var(--flood)"></span>
      <span class="name">Flood <small>洪水浸水想定区域</small></span>
      <div class="tg on"><div class="knob"></div></div>
    </div>
    <div class="row">
      <span class="swatch" style="background:var(--landslide)"></span>
      <span class="name">Landslide <small>土砂災害警戒区域</small></span>
      <div class="tg on"><div class="knob"></div></div>
    </div>
    <div class="row">
      <span class="swatch" style="background:var(--tsunami)"></span>
      <span class="name">Tsunami <small>津波浸水想定区域</small></span>
      <div class="tg off"><div class="knob"></div></div>
    </div>

    <div class="opacity">
      <label><span>Overlay opacity</span><span>60%</span></label>
      <div class="track"><div class="h"></div></div>
    </div>
  </div>
</body>
</html>
