<!-- @dsCard group="ハザードマップ" name="リスク判定結果カード" subtitle="危険/安全・想定浸水深・避難導線" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SafeTabi — Risk Result Cards</title>
<style>
  :root{--danger:#d93f0b;--safe:#0e8a16;--ink:#1c2530;--muted:#5b6b7b;--line:#e3e8ee}
  *{box-sizing:border-box} body{margin:0;background:#aeb7bf;font-family:"Hiragino Sans",system-ui,sans-serif;padding:24px;display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
  .card{width:330px;background:#fff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.16);padding:16px;border-left:6px solid var(--danger)}
  .card.safe{border-left-color:var(--safe)}
  .head{display:flex;gap:12px;align-items:center}
  .ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto}
  .card .ic{background:rgba(217,63,11,.12);color:var(--danger)}
  .card.safe .ic{background:rgba(14,138,22,.12);color:var(--safe)}
  h2{margin:0;font-size:16px;color:var(--ink)} .head p{margin:2px 0 0;font-size:12px;color:var(--muted)}
  .metrics{display:flex;gap:10px;margin-top:14px}
  .m{flex:1;background:#f5f7f9;border-radius:10px;padding:10px;text-align:center}
  .m b{display:block;font-size:18px;color:var(--ink)} .m span{font-size:10.5px;color:var(--muted)}
  .m.alert b{color:var(--danger)}
  .types{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:11px;padding:4px 9px;border-radius:20px;background:#eef2f6;color:var(--ink)}
  .chip.on{background:rgba(217,63,11,.12);color:var(--danger);font-weight:700}
  .btn{margin-top:14px;display:block;text-align:center;text-decoration:none;font-weight:700;font-size:13.5px;padding:11px;border-radius:12px;background:var(--danger);color:#fff}
  .card.safe .btn{background:var(--safe)}
</style>
</head>
<body>
  <!-- Danger -->
  <div class="card">
    <div class="head">
      <div class="ic">⚠</div>
      <div><h2>In a flood hazard zone</h2><p>浸水想定区域内にいます</p></div>
    </div>
    <div class="metrics">
      <div class="m alert"><b>~3.0 m</b><span>Est. depth 想定浸水深</span></div>
      <div class="m"><b>320 m</b><span>Nearest shelter 最寄り避難所</span></div>
    </div>
    <div class="types">
      <span class="chip on">Flood 洪水</span>
      <span class="chip on">Landslide 土砂</span>
      <span class="chip">Tsunami 津波</span>
    </div>
    <a class="btn" href="#">Go to nearest shelter →</a>
  </div>

  <!-- Safe -->
  <div class="card safe">
    <div class="head">
      <div class="ic">✓</div>
      <div><h2>No hazard zone here</h2><p>この場所に想定区域はありません</p></div>
    </div>
    <div class="metrics">
      <div class="m"><b>—</b><span>Est. depth 想定浸水深</span></div>
      <div class="m"><b>540 m</b><span>Nearest shelter 最寄り避難所</span></div>
    </div>
    <div class="types">
      <span class="chip">Flood 洪水</span>
      <span class="chip">Landslide 土砂</span>
      <span class="chip">Tsunami 津波</span>
    </div>
    <a class="btn" href="#">Check shelters nearby →</a>
  </div>
</body>
</html>
