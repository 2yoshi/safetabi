<!-- @dsCard group="ハザードマップ" name="凡例（多言語）" subtitle="色と意味・5段階浸水深" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SafeTabi — Legend</title>
<style>
  :root{--ink:#1c2530;--muted:#5b6b7b;--line:#e3e8ee}
  *{box-sizing:border-box} body{margin:0;background:#aeb7bf;font-family:"Hiragino Sans",system-ui,sans-serif;padding:24px}
  .legend{width:300px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.16);padding:16px}
  h3{margin:0 0 2px;font-size:14px;color:var(--ink)}
  .sub{margin:0 0 12px;font-size:11px;color:var(--muted)}
  .grp{font-size:11.5px;font-weight:700;color:var(--ink);margin:12px 0 6px}
  .item{display:flex;align-items:center;gap:10px;padding:5px 0}
  .sw{width:22px;height:14px;border-radius:3px;flex:0 0 auto}
  .item .t{font-size:12px;color:var(--ink)} .item .t small{color:var(--muted)}
  .depthscale{display:flex;height:14px;border-radius:3px;overflow:hidden;margin:6px 0 4px}
  .depthscale i{flex:1}
  .ticks{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted)}
  .langs{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted);line-height:1.5}
</style>
</head>
<body>
  <div class="legend">
    <h3>Legend / 凡例</h3>
    <p class="sub">Hazard types &amp; flood depth</p>

    <div class="grp">Flood depth / 浸水深</div>
    <div class="depthscale">
      <i style="background:#c9e2f5"></i><i style="background:#8ec1e8"></i>
      <i style="background:#5a9bd4"></i><i style="background:#2b6cb0"></i><i style="background:#163e6b"></i>
    </div>
    <div class="ticks"><span>&lt;0.5m</span><span>3m</span><span>5m</span><span>10m</span><span>&gt;20m</span></div>

    <div class="grp">Hazard type / 災害種別</div>
    <div class="item"><span class="sw" style="background:#2b6cb0"></span><span class="t">Flood <small>洪水</small></span></div>
    <div class="item"><span class="sw" style="background:#9c5a2d"></span><span class="t">Landslide <small>土砂災害</small></span></div>
    <div class="item"><span class="sw" style="background:#6b46c1"></span><span class="t">Tsunami <small>津波</small></span></div>

    <div class="langs">Available: English · 日本語 · 简体中文 · 繁體中文 · 한국어</div>
  </div>
</body>
</html>
