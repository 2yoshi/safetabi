<!-- @dsCard group="ハザードマップ" name="メイン画面" subtitle="地図＋現在地＋ハザード重畳＋アラートバー＋出典" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SafeTabi — Hazard Map (Main)</title>
<style>
  :root{
    --danger:#d93f0b; --warn:#e8a317; --safe:#0e8a16; --ink:#1c2530; --muted:#5b6b7b;
    --flood:#2b6cb0; --landslide:#9c5a2d; --tsunami:#6b46c1;
    --card:#ffffff; --line:#e3e8ee;
  }
  *{box-sizing:border-box} body{margin:0;background:#aeb7bf;font-family:"Hiragino Sans",system-ui,-apple-system,sans-serif}
  .phone{width:390px;height:844px;margin:16px auto;background:#eef1f4;position:relative;overflow:hidden;border-radius:36px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  /* alert bar */
  .alert{position:absolute;top:0;left:0;right:0;z-index:5;background:var(--danger);color:#fff;padding:14px 16px;display:flex;gap:10px;align-items:center}
  .alert .lvl{background:#fff;color:var(--danger);font-weight:800;border-radius:6px;padding:2px 8px;font-size:12px;white-space:nowrap}
  .alert .txt{font-size:13px;line-height:1.3}
  /* map */
  .map{position:absolute;inset:0;background:
      linear-gradient(135deg,#e9eef0 0%,#dfe6e6 100%);}
  .roads{position:absolute;inset:0;opacity:.5;
     background:
      repeating-linear-gradient(90deg,transparent 0 58px,#cfd6da 58px 60px),
      repeating-linear-gradient(0deg,transparent 0 70px,#cfd6da 70px 72px);}
  .poly{position:absolute;border-radius:40% 60% 55% 45%/50% 45% 55% 50%;mix-blend-mode:multiply;filter:blur(.3px)}
  .p-flood{background:rgba(43,108,176,.45);width:230px;height:190px;top:300px;left:90px}
  .p-land{background:rgba(156,90,45,.5);width:120px;height:120px;top:200px;left:30px}
  .p-tsu{background:rgba(107,70,193,.38);width:170px;height:150px;top:470px;left:170px}
  /* current location */
  .pin{position:absolute;top:392px;left:188px;z-index:4}
  .pin .pulse{position:absolute;width:64px;height:64px;left:-26px;top:-26px;border-radius:50%;background:rgba(37,99,235,.18)}
  .pin .dot{width:18px;height:18px;border-radius:50%;background:#2563eb;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35)}
  .pin .label{position:absolute;left:24px;top:-6px;background:#1c2530;color:#fff;font-size:11px;padding:3px 7px;border-radius:6px;white-space:nowrap}
  /* layer FAB */
  .fab{position:absolute;right:14px;bottom:236px;z-index:6;width:48px;height:48px;border-radius:14px;background:var(--card);box-shadow:0 4px 14px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:20px}
  .loc{position:absolute;right:14px;bottom:180px;z-index:6;width:48px;height:48px;border-radius:14px;background:var(--card);box-shadow:0 4px 14px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:20px}
  /* on-map attribution (always visible / 出典は常時表示) */
  .credit{position:absolute;left:12px;bottom:230px;z-index:6;background:rgba(255,255,255,.85);font-size:9.5px;color:#333;padding:3px 8px;border-radius:6px;max-width:250px;line-height:1.35}
  /* bottom sheet: risk summary */
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:7;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -6px 24px rgba(0,0,0,.15);padding:14px 16px 22px}
  .grab{width:40px;height:4px;border-radius:2px;background:#d3dae1;margin:0 auto 12px}
  .risk{display:flex;gap:12px;align-items:center}
  .badge{width:46px;height:46px;border-radius:12px;background:rgba(217,63,11,.12);color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto}
  .risk h2{margin:0;font-size:16px;color:var(--ink)}
  .risk p{margin:3px 0 0;font-size:12.5px;color:var(--muted)}
  .depth{margin-left:auto;text-align:right}
  .depth b{font-size:20px;color:var(--danger)} .depth span{font-size:11px;color:var(--muted);display:block}
  .cta{margin-top:14px;display:flex;gap:10px}
  .cta a{flex:1;text-align:center;text-decoration:none;font-size:13.5px;font-weight:700;padding:11px;border-radius:12px}
  .cta .primary{background:var(--danger);color:#fff}
  .cta .ghost{background:#eef2f6;color:var(--ink)}
  /* offline judgment data source (判定データ＝#12 国土数値情報変換) */
  .judge-src{margin-top:10px;font-size:10px;color:var(--muted);line-height:1.35}
</style>
</head>
<body>
  <div class="phone">
    <div class="map">
      <div class="roads"></div>
      <div class="poly p-land"></div>
      <div class="poly p-flood"></div>
      <div class="poly p-tsu"></div>
      <div class="pin">
        <div class="pulse"></div><div class="dot"></div>
        <div class="label">You are here</div>
      </div>
      <div class="fab" title="Layers">▦</div>
      <div class="loc" title="My location">◎</div>
      <div class="credit">出典: 地理院タイル / ハザードマップポータルサイト</div>
    </div>

    <div class="alert">
      <span class="lvl">LEVEL 4</span>
      <span class="txt">Evacuation order — Heavy rain / flood warning in this area</span>
    </div>

    <div class="sheet">
      <div class="grab"></div>
      <div class="risk">
        <div class="badge">⚠</div>
        <div>
          <h2>You are in a flood hazard zone</h2>
          <p>Estimated inundation depth at your location</p>
        </div>
        <div class="depth"><b>~3.0 m</b><span>0.5–3.0 m</span></div>
      </div>
      <div class="cta">
        <a class="primary" href="#">Nearest shelter →</a>
        <a class="ghost" href="#">Hazard details</a>
      </div>
      <div class="judge-src">出典（判定データ）: 国土数値情報（洪水浸水想定区域 等）</div>
    </div>
  </div>
</body>
</html>
