<!-- @dsCard group="ハザードマップ" name="言語切替" subtitle="日英中(簡/繁)韓" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SafeTabi — Language Switcher</title>
<style>
  :root{--ink:#1c2530;--muted:#5b6b7b;--line:#e3e8ee;--accent:#2563eb}
  *{box-sizing:border-box} body{margin:0;background:#aeb7bf;font-family:"Hiragino Sans",system-ui,sans-serif;padding:24px}
  .sheet{width:300px;margin:0 auto;background:#fff;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.18);padding:16px}
  h3{margin:0 0 2px;font-size:15px;color:var(--ink)}
  .sub{margin:0 0 12px;font-size:11px;color:var(--muted)}
  .opt{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;border:1px solid var(--line);margin-bottom:8px;cursor:pointer}
  .opt.sel{border-color:var(--accent);background:rgba(37,99,235,.06)}
  .flag{width:30px;height:30px;border-radius:8px;background:#eef2f6;display:flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 auto}
  .opt .n{font-size:14px;color:var(--ink)} .opt .n small{display:block;font-size:11px;color:var(--muted)}
  .opt .ck{margin-left:auto;color:var(--accent);font-weight:800;opacity:0}
  .opt.sel .ck{opacity:1}
</style>
</head>
<body>
  <div class="sheet">
    <h3>Language / 言語</h3>
    <p class="sub">Choose your language</p>

    <div class="opt sel"><span class="flag">EN</span><span class="n">English <small>English</small></span><span class="ck">✓</span></div>
    <div class="opt"><span class="flag">日</span><span class="n">日本語 <small>Japanese</small></span><span class="ck">✓</span></div>
    <div class="opt"><span class="flag">简</span><span class="n">简体中文 <small>Chinese (Simplified)</small></span><span class="ck">✓</span></div>
    <div class="opt"><span class="flag">繁</span><span class="n">繁體中文 <small>Chinese (Traditional)</small></span><span class="ck">✓</span></div>
    <div class="opt"><span class="flag">한</span><span class="n">한국어 <small>Korean</small></span><span class="ck">✓</span></div>
  </div>
</body>
</html>
